name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Checkout embed-google-fonts
        uses: actions/checkout@v4
        with:
          repository: mtedaldi/embed-google-fonts
          path: embed-google-fonts

      - name: Copy index.html to build dir
        run: |
          mkdir -p build
          cp index.html build/index.html

      - name: Inline JSZip from cdnjs
        run: |
          python3 - <<'EOF'
          import urllib.request, re, pathlib

          # ── Read HTML as text (safe: HTML itself is clean UTF-8) ──────────────
          html_path = pathlib.Path('build/index.html')
          html = html_path.read_text(encoding='utf-8')

          jszip_url = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js'
          print(f'Downloading JSZip from {jszip_url}')
          with urllib.request.urlopen(jszip_url, timeout=30) as r:
              jszip_bytes = r.read()          # <-- raw bytes, NOT decoded yet
          print(f'  → {len(jszip_bytes)//1024} KB')

          # ── All binary-level fixes operate on bytes, never on decoded text ───

          # Fix 1: simplify UMD to always assign window.JSZip
          old_umd = (
              b'!function(e){if("object"==typeof exports&&"undefined"!=typeof module)'
              b'module.exports=e();else if("function"==typeof define&&define.amd)'
              b'define([],e);else{("undefined"!=typeof window?window:'
              b'"undefined"!=typeof global?global:'
              b'"undefined"!=typeof self?self:this).JSZip=e()}}'
          )
          new_umd = b'!function(e){(window||self||this).JSZip=e()}'
          if old_umd in jszip_bytes:
              jszip_bytes = jszip_bytes.replace(old_umd, new_umd, 1)
              print('  ✓ UMD wrapper simplified')
          else:
              print('  WARNING: UMD pattern not found — skipping UMD simplification')

          # Fix 2: escape raw 0x0a (newline) bytes inside JS string literals.
          # JSZip embeds ZIP compression magic numbers as raw binary in string
          # literals. A bare 0x0a inside a string is a SyntaxError in the browser.
          # Walk byte-by-byte; when inside a string, replace 0x0a with b'\\n'.
          # All other bytes — including other non-printable/binary bytes — are
          # passed through unchanged so compression magic values stay intact.
          out = bytearray()
          in_string = False
          quote_char = 0
          i = 0
          nl_fixed = 0
          while i < len(jszip_bytes):
              b = jszip_bytes[i]
              if not in_string:
                  out.append(b)
                  if b in (0x22, 0x27):        # opening " or '
                      in_string = True
                      quote_char = b
              else:
                  if b == 0x5c:                # backslash: copy escape + next byte
                      out.append(b)
                      i += 1
                      if i < len(jszip_bytes):
                          out.append(jszip_bytes[i])
                  elif b == quote_char:         # closing quote
                      out.append(b)
                      in_string = False
                  elif b == 0x0a:              # raw LF inside string → \n
                      out.extend(b'\\n')
                      nl_fixed += 1
                  else:
                      out.append(b)            # all other bytes unchanged
              i += 1
          jszip_bytes = bytes(out)
          print(f'  ✓ Raw newlines in string literals escaped: {nl_fixed}')

          # Fix 3: escape "\x" string-literal concatenation.
          # JSZip's pretty() function builds hex escape strings as "\x" + digits.
          # The literal string "\x" (with no following hex digits) is a SyntaxError.
          bad_x = b'"\\x"+'
          good_x = b'"\\\\x"+'
          x_fixed = jszip_bytes.count(bad_x)
          jszip_bytes = jszip_bytes.replace(bad_x, good_x)
          print(f'  ✓ Malformed \\x escape sequences fixed: {x_fixed}')

          # Fix 4: escape </script> occurrences so the browser HTML parser does
          # not prematurely close the script block.
          script_close_fixed = jszip_bytes.count(b'</script')
          jszip_bytes = jszip_bytes.replace(b'</script', b'<\\/script')
          print(f'  ✓ </script> occurrences escaped: {script_close_fixed}')

          # ── Now safe to decode: only printable + escaped sequences remain ────
          jszip_js = jszip_bytes.decode('latin-1')  # latin-1 is byte-transparent

          # ── Splice into HTML ──────────────────────────────────────────────────
          pattern = re.compile(
              r'<script\s+src=["\'][^"\']*jszip[^"\']*["\'][^>]*>\s*</script>',
              re.IGNORECASE
          )
          count = len(pattern.findall(html))
          if count == 0:
              print('ERROR: No JSZip <script src> tag found in index.html', flush=True)
              raise SystemExit(1)

          html = pattern.sub(f'<script>\n{jszip_js}\n</script>', html, count=1)
          print(f'  ✓ JSZip inlined ({count} tag replaced)')

          html_path.write_text(html, encoding='utf-8')
          EOF

      - name: Embed Google Fonts
        run: |
          python3 embed-google-fonts/embed-google-fonts.py build/index.html --inplace

      - name: Verify output (no external requests, no JS syntax hazards)
        run: |
          python3 - <<'EOF'
          import pathlib, sys, re

          html = pathlib.Path('build/index.html').read_text(encoding='utf-8')
          issues = []

          # Font embedding checks
          if re.search(r'<link\b[^>]*rel=["\']stylesheet["\'][^>]*fonts\.googleapis\.com', html, re.IGNORECASE) or \
             re.search(r'<link\b[^>]*fonts\.googleapis\.com[^>]*rel=["\']stylesheet["\']', html, re.IGNORECASE):
              issues.append('<link rel="stylesheet"> with Google Fonts still present')
          if re.search(r'@import\s+url\(["\']?https://fonts\.googleapis\.com', html, re.IGNORECASE):
              issues.append('@import with Google Fonts still present')
          if re.search(r'url\(["\']?https://fonts\.gstatic\.com', html, re.IGNORECASE):
              issues.append('External gstatic font URL still present')

          # JSZip CDN check
          if re.search(r'<script\s+src=["\'][^"\']*jszip[^"\']*["\']', html, re.IGNORECASE):
              issues.append('JSZip CDN <script src> still present')

          # Raw newline inside JS string literal check (bytes-level)
          jszip_start = html.find('JSZip v3.10.1')
          jszip_end   = html.find('</script>', jszip_start)
          if jszip_start > 0 and jszip_end > jszip_start:
              jszip_bytes = html[jszip_start:jszip_end].encode('utf-8')
              in_str = False; qc = 0; esc = False
              for i, b in enumerate(jszip_bytes):
                  if esc:
                      esc = False
                  elif not in_str:
                      if b in (0x22, 0x27): in_str = True; qc = b
                  else:
                      if b == 0x5c: esc = True
                      elif b == qc: in_str = False
                      elif b == 0x0a:
                          issues.append(f'Raw newline in JS string literal at offset {i}')
                          break
          else:
              issues.append('JSZip block not found in output')

          size_kb = len(html.encode('utf-8')) // 1024
          print(f'Output size: {size_kb} KB')

          if issues:
              for issue in issues:
                  print(f'FAIL: {issue}', file=sys.stderr)
              sys.exit(1)
          else:
              print('✓ All checks passed')
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
